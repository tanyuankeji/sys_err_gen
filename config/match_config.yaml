# =============================================================================
# sys_err_gen 匹配配置文件
# =============================================================================
# 说明:
#   - 本文件定义 Excel 输入、列匹配规则、模板路径、输出设置和日志配置
#   - 支持通过 .env 环境变量覆盖部分配置项
#   - match.columns 中的 keyword 为空字符串""表示匹配任意非空值
#   - 多列匹配为 AND 逻辑（所有列条件需同时满足）
# =============================================================================

# ---------- Excel 输入配置 ----------
excel:
  # Excel 文件路径（相对于项目根目录）
  file: "sys_err错误表.xls"
  # 目标 Sheet 名称
  sheet: "错误动作"
  # 存在合并单元格需要向前填充(ffill)的列名
  merge_columns:
    - "类型"
    - "模块"

# ---------- 列匹配规则 ----------
match:
  # 匹配列规则列表，所有条件为 AND 关系
  # name: 列名（必须与 Excel 中的中文列名一致）
  # keyword: 匹配关键词，为空字符串表示匹配任意非空值
  columns:
    # 示例 1: 匹配"数字信号"列为"非空"的行
    - name: "数字信号"
      keyword: ""

    # 示例 2: 匹配"模块"列为任意非空值的行
    # - name: "模块"
    #   keyword: ""

    # 示例 3: 匹配"模块"列包含"BG"的行（BG相关错误）
    # - name: "模块"
    #   keyword: ""

# ---------- 模板配置 ----------
template:
  # Jinja2 模板文件路径（相对于项目根目录）
  file: "templates/error_handler.j2"
  # 是否启用 HTML 自动转义（Verilog 代码需要关闭）
  autoescape: false

# ---------- 输出配置 ----------
output:
  # 输出目录
  directory: "output"
  # 输出文件名
  filename: "sys_err_gen.v"
  # 是否覆盖已有文件
  overwrite: true

# ---------- 日志配置 ----------
logging:
  # 日志级别: DEBUG | INFO | WARNING | ERROR | CRITICAL
  level: "DEBUG"
  # 日志文件存放目录
  dir: "logs"
  # 日志文件名（为 null 时按日期自动命名: sys_err_gen_YYYYMMDD.log）
  file: null
